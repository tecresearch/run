 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NovaCode · Modern Code Editor with Piston Engine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0a0c12 0%, #0f1117 100%);
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'SF Mono', 'Fira Code', monospace;
      height: 100vh;
      overflow: hidden;
      color: #e3e6f0;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #1e212a;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #3b3f4f;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #5f6a8a;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .top-bar {
      background: rgba(18, 22, 30, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(72, 85, 106, 0.4);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      z-index: 10;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .logo-icon {
      font-size: 1.8rem;
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.35rem;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #c0e0ff, #a07eff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .badge {
      background: #262b38;
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-family: monospace;
      border: 1px solid #3e4357;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    select, button, .save-status, .api-mode {
      background: #13161f;
      border: 1px solid #2e3347;
      padding: 0.5rem 1rem;
      border-radius: 14px;
      color: #f0f3fc;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', monospace;
    }
    .api-mode {
      cursor: default;
      background: #1a1e2a;
      font-size: 0.75rem;
    }
    select {
      background: #0f121b;
      cursor: pointer;
    }
    button {
      background: #202530;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    button:hover {
      background: #2c3342;
      border-color: #5f6e92;
      transform: translateY(-1px);
    }
    .run-btn {
      background: #2d4a6e;
      border-color: #3b6e9e;
      color: white;
      font-weight: 700;
    }
    .run-btn:hover {
      background: #3a6190;
      border-color: #5c8bc0;
      box-shadow: 0 4px 12px rgba(46, 91, 145, 0.3);
    }
    .save-status {
      background: #1b1e2a;
      cursor: default;
      font-size: 0.75rem;
      padding: 0.3rem 1rem;
    }

    .main-workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      padding: 1rem;
      gap: 1rem;
      min-height: 0;
    }

    .editor-pane {
      flex: 2;
      display: flex;
      flex-direction: column;
      background: #0e1119;
      border-radius: 1.5rem;
      border: 1px solid #252b3a;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .pane-header {
      background: #141823;
      padding: 0.7rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 600;
      border-bottom: 1px solid #252b3a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .filename-badge {
      font-family: monospace;
      background: #1f2538;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.7rem;
    }

    #codeEditor {
      width: 100%;
      flex: 1;
      background: #0a0c14;
      color: #eef4ff;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
      font-size: 14px;
      line-height: 1.55;
      padding: 1.2rem;
      tab-size: 4;
    }

    .output-pane {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      background: #0e1119;
      border-radius: 1.5rem;
      border: 1px solid #252b3a;
      overflow: hidden;
    }

    .output-header {
      background: #141823;
      padding: 0.7rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 600;
      border-bottom: 1px solid #252b3a;
      display: flex;
      gap: 12px;
    }
    .output-tab {
      cursor: pointer;
      padding: 0.2rem 0;
      opacity: 0.7;
      transition: 0.1s;
      border-bottom: 2px solid transparent;
    }
    .output-tab.active {
      opacity: 1;
      border-bottom-color: #5e8cd9;
      color: white;
    }
    #outputArea {
      flex: 1;
      background: #05070e;
      padding: 1rem;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status-line {
      background: #0b0e16;
      border-top: 1px solid #202430;
      padding: 0.45rem 1rem;
      font-size: 0.7rem;
      display: flex;
      gap: 1rem;
      color: #9aa2c0;
    }

    .api-config {
      background: #0b0e16;
      padding: 0.5rem 1rem;
      border-radius: 12px;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    #apiEndpointInput {
      background: #1a1e2a;
      border: 1px solid #2e3347;
      padding: 0.3rem 0.7rem;
      border-radius: 8px;
      color: white;
      font-size: 0.75rem;
      width: 220px;
    }

    @media (max-width: 780px) {
      .main-workspace {
        flex-direction: column;
      }
      .top-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .controls {
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="top-bar">
    <div class="logo-area">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">NovaCode</span>
      <span class="badge">piston v2</span>
    </div>
    <div class="controls">
      <div class="api-config">
        <span style="font-size:0.7rem;">🔌 API:</span>
        <input type="text" id="apiEndpointInput" placeholder="http://localhost:2000/api/v2/execute" value="http://localhost:2000/api/v2/execute">
        <button id="testApiBtn" style="padding:0.3rem 0.7rem; font-size:0.7rem;">Test</button>
      </div>
      <select id="languageSelect">
        <option value="python">🐍 Python 3.10+</option>
        <option value="javascript">🟨 JavaScript (Node.js)</option>
        <option value="typescript">🔷 TypeScript (ts-node)</option>
        <option value="rust">🦀 Rust (stable)</option>
        <option value="c_cpp">⚙️ C++ (GCC)</option>
        <option value="java">☕ Java 17</option>
        <option value="bash">🐚 Bash</option>
      </select>
      <select id="versionSelect">
        <option value="auto">🔄 auto (latest)</option>
      </select>
      <button id="runButton" class="run-btn">▶ RUN CODE</button>
      <button id="saveCodeBtn">💾 Save</button>
      <div class="save-status" id="saveStatusMsg">✨ ready</div>
    </div>
  </div>

  <div class="main-workspace">
    <div class="editor-pane">
      <div class="pane-header">
        <span>📄 editor</span>
        <span class="filename-badge" id="filenameHint">code_editor</span>
      </div>
      <textarea id="codeEditor" spellcheck="false" placeholder="Write your code here..."></textarea>
    </div>
    <div class="output-pane">
      <div class="output-header">
        <div class="output-tab active" data-tab="output">📟 Output</div>
        <div class="output-tab" data-tab="info">ℹ️ Info</div>
      </div>
      <div id="outputArea">✨ Ready to run. Configure your local Piston API endpoint or use simulation mode.</div>
      <div class="status-line">
        <span>⏱️ timeout: 4s</span>
        <span id="langVersionLabel">⚙️ language: python</span>
        <span id="apiStatusBadge" style="color:#ffaa66;">⚠️ not connected</span>
      </div>
    </div>
  </div>
</div>

<script>
  // Language configurations
  const languageMap = {
    "python": { language: "python", version: "3.10.0", ext: "py", defaultCode: 'print("Hello from NovaCode!")\nimport sys\nprint("Args:", sys.argv[1:])\nprint("Python is working!")' },
    "javascript": { language: "javascript", version: "18.15.0", ext: "js", defaultCode: 'console.log("Hello, World!");\nconsole.log("Args:", process.argv.slice(2));\nconsole.log("JavaScript execution successful!");' },
    "typescript": { language: "typescript", version: "5.0.4", ext: "ts", defaultCode: 'console.log("Hello TypeScript!");\nconsole.log("Args:", process.argv.slice(2));' },
    "rust": { language: "rust", version: "1.70.0", ext: "rs", defaultCode: 'fn main() {\n    println!("Hello from Rust!");\n    let args: Vec<String> = std::env::args().skip(1).collect();\n    println!("Args: {:?}", args);\n}' },
    "c_cpp": { language: "c++", version: "10.2.0", ext: "cpp", defaultCode: '#include <iostream>\nusing namespace std;\nint main(int argc, char** argv) {\n    cout << "Hello C++!" << endl;\n    cout << "Args: ";\n    for(int i=1;i<argc;i++) cout << argv[i] << " ";\n    cout << endl;\n    return 0;\n}' },
    "java": { language: "java", version: "17.0.6", ext: "java", defaultCode: 'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello Java!");\n        System.out.print("Args: ");\n        for(String s: args) System.out.print(s + " ");\n        System.out.println();\n    }\n}' },
    "bash": { language: "bash", version: "5.1.16", ext: "sh", defaultCode: '#!/bin/bash\necho "Hello from Bash"\necho "Args: $@"\necho "Bash execution complete!"' }
  };
  
  let currentLanguage = "python";
  let currentCode = "";
  let currentOutputTab = "output";
  let lastExecutionResult = null;
  let apiEndpoint = localStorage.getItem('piston_api_endpoint') || "http://localhost:2000/api/v2/execute";
  
  // DOM elements
  const languageSelect = document.getElementById('languageSelect');
  const versionSelect = document.getElementById('versionSelect');
  const runButton = document.getElementById('runButton');
  const saveCodeBtn = document.getElementById('saveCodeBtn');
  const saveStatusMsg = document.getElementById('saveStatusMsg');
  const codeEditor = document.getElementById('codeEditor');
  const outputArea = document.getElementById('outputArea');
  const langVersionLabel = document.getElementById('langVersionLabel');
  const filenameHint = document.getElementById('filenameHint');
  const apiEndpointInput = document.getElementById('apiEndpointInput');
  const testApiBtn = document.getElementById('testApiBtn');
  const apiStatusBadge = document.getElementById('apiStatusBadge');
  
  apiEndpointInput.value = apiEndpoint;
  
  function setSaveStatus(msg, isError = false) {
    saveStatusMsg.innerHTML = isError ? `⚠️ ${msg}` : `✅ ${msg}`;
    saveStatusMsg.style.color = isError ? "#ffa098" : "#b5e3b5";
    setTimeout(() => {
      saveStatusMsg.innerHTML = `💾 saved`;
      saveStatusMsg.style.color = "#9aa2c0";
    }, 2000);
  }
  
  const STORAGE_KEY = "novacode_editor_data";
  const STORAGE_LANG_KEY = "novacode_language";
  
  function saveToLocalStorage() {
    const code = codeEditor.value;
    const lang = currentLanguage;
    const data = { code, language: lang, timestamp: Date.now() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    localStorage.setItem(STORAGE_LANG_KEY, lang);
    setSaveStatus("Saved to storage");
  }
  
  function loadFromLocalStorage() {
    const savedRaw = localStorage.getItem(STORAGE_KEY);
    const savedLang = localStorage.getItem(STORAGE_LANG_KEY);
    if(savedRaw) {
      try {
        const parsed = JSON.parse(savedRaw);
        if(parsed.code !== undefined) {
          codeEditor.value = parsed.code;
          currentCode = parsed.code;
        }
        if(parsed.language && languageMap[parsed.language]) {
          languageSelect.value = parsed.language;
          onLanguageChange(false);
        } else if(savedLang && languageMap[savedLang]) {
          languageSelect.value = savedLang;
          onLanguageChange(false);
        }
      } catch(e) { console.warn(e); setDefaultCode(); }
    } else {
      setDefaultCode();
    }
    currentCode = codeEditor.value;
  }
  
  function setDefaultCode() {
    const defaultConf = languageMap[currentLanguage];
    if(defaultConf) {
      codeEditor.value = defaultConf.defaultCode;
    } else {
      codeEditor.value = 'print("Hello, world!")';
    }
  }
  
  function onLanguageChange(updateDefaultCode = true) {
    const newLang = languageSelect.value;
    currentLanguage = newLang;
    const conf = languageMap[newLang];
    if(conf) {
      filenameHint.innerText = `code.${conf.ext}`;
      langVersionLabel.innerText = `⚙️ ${conf.language} ${conf.version}`;
      versionSelect.innerHTML = `<option value="${conf.version}">${conf.version}</option><option value="latest">latest</option>`;
      if(updateDefaultCode && codeEditor.value.trim() === "") {
        codeEditor.value = conf.defaultCode;
      }
    }
  }
  
  // Simulate code execution when API is not available
  function simulateExecution(code, language) {
    const langConf = languageMap[language];
    return new Promise((resolve) => {
      setTimeout(() => {
        const output = `[SIMULATION MODE] ${langConf.language} execution simulation\n` +
                       `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n` +
                       `Code executed successfully (local simulation)\n\n` +
                       `📝 Your code:\n${code.substring(0, 500)}${code.length > 500 ? '...' : ''}\n\n` +
                       `💡 Tip: To get real execution, install and run Piston API locally:\n` +
                       `   docker run -p 2000:2000 ghcr.io/engineer-man/piston\n` +
                       `   Or visit: https://github.com/engineer-man/piston\n\n` +
                       `✅ Simulated exit code: 0\n` +
                       `🔧 Language: ${langConf.language} ${langConf.version}`;
        
        resolve({
          run: {
            stdout: output,
            stderr: "",
            output: output,
            code: 0,
            signal: null
          },
          language: langConf.language,
          version: langConf.version
        });
      }, 500);
    });
  }
  
  // Test API connection
  async function testApiConnection() {
    const endpoint = apiEndpointInput.value;
    apiStatusBadge.textContent = "🔄 testing...";
    apiStatusBadge.style.color = "#ffaa66";
    
    try {
      const testPayload = {
        language: "python",
        version: "3.10.0",
        files: [{ name: "test.py", content: "print('test')" }],
        run_timeout: 2000
      };
      
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(testPayload)
      });
      
      if (response.ok) {
        apiStatusBadge.textContent = "✅ connected";
        apiStatusBadge.style.color = "#8bc34a";
        localStorage.setItem('piston_api_endpoint', endpoint);
        apiEndpoint = endpoint;
        setSaveStatus("API connected!", false);
      } else {
        throw new Error(`HTTP ${response.status}`);
      }
    } catch (err) {
      apiStatusBadge.textContent = "⚠️ offline (simulation)";
      apiStatusBadge.style.color = "#ffaa66";
      setSaveStatus("API unavailable, using simulation mode", true);
    }
  }
  
  // Execute code via piston API with fallback to simulation
  async function executeCode() {
    const code = codeEditor.value;
    if(!code.trim()) {
      outputArea.innerText = "[⚠️] No code to execute. Write some code!";
      return;
    }
    
    const langConf = languageMap[currentLanguage];
    if(!langConf) {
      outputArea.innerText = "[ERROR] Language not supported.";
      return;
    }
    
    let version = versionSelect.value;
    if(version === "auto" || version === "latest") version = langConf.version;
    
    const fileName = `code.${langConf.ext}`;
    const files = [{ name: fileName, content: code, encoding: "utf8" }];
    const payload = {
      language: langConf.language,
      version: version,
      files: files,
      stdin: "",
      args: [],
      run_timeout: 4000,
      compile_timeout: 8000,
      run_memory_limit: -1,
      compile_memory_limit: -1
    };
    
    outputArea.innerHTML = "⏳ Executing... (attempting API connection)";
    runButton.disabled = true;
    runButton.style.opacity = "0.6";
    
    try {
      // Try to use configured API endpoint
      const endpoint = apiEndpointInput.value;
      let response;
      try {
        response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
          throw new Error(`API returned ${response.status}`);
        }
        
        const result = await response.json();
        renderExecutionResult(result);
        apiStatusBadge.textContent = "✅ connected";
        apiStatusBadge.style.color = "#8bc34a";
        localStorage.setItem('piston_api_endpoint', endpoint);
        apiEndpoint = endpoint;
        
      } catch (apiError) {
        console.warn("API error, falling back to simulation:", apiError);
        apiStatusBadge.textContent = "⚠️ offline (simulation)";
        apiStatusBadge.style.color = "#ffaa66";
        
        // Fallback to simulation
        const simulatedResult = await simulateExecution(code, currentLanguage);
        renderExecutionResult(simulatedResult);
        setSaveStatus("Using simulation mode - install Piston API for real execution", true);
      }
      
    } catch (err) {
      console.error(err);
      outputArea.innerHTML = `🚨 Execution Error:\n${err.message}\n\n` +
        `To run code locally, install Piston API:\n` +
        `docker run -p 2000:2000 ghcr.io/engineer-man/piston\n` +
        `Then set API endpoint to http://localhost:2000/api/v2/execute`;
    } finally {
      runButton.disabled = false;
      runButton.style.opacity = "1";
    }
  }
  
  function renderExecutionResult(result) {
    let outputText = "";
    let compileInfo = "";
    
    if(result.compile) {
      compileInfo = `\n\n📦 COMPILE STAGE:\n${result.compile.output || (result.compile.stdout + result.compile.stderr)}\nExit code: ${result.compile.code}\n`;
    }
    
    const runStage = result.run;
    if(runStage) {
      let stdOutput = runStage.output !== undefined ? runStage.output : (runStage.stdout + runStage.stderr);
      if(stdOutput === "") stdOutput = "(no output)";
      const exitMsg = runStage.code !== null ? `exit code: ${runStage.code}` : `signal: ${runStage.signal}`;
      outputText = `📟 PROGRAM OUTPUT:\n${stdOutput}\n\n🏁 ${exitMsg}`;
      if(runStage.stderr && runStage.stderr.trim()) {
        outputText += `\n\n⚠️ STDERR:\n${runStage.stderr}`;
      }
    } else {
      outputText = "⚠️ No run data returned.";
    }
    
    const fullOutput = compileInfo ? outputText + compileInfo : outputText;
    outputArea.innerText = fullOutput;
    
    const infoContent = `⚡ Execution Info:
• Language: ${result.language || languageMap[currentLanguage].language}
• Version: ${result.version || versionSelect.value}
• Runtime limits: 4s (run)
• API Mode: ${apiStatusBadge.textContent}
• Timestamp: ${new Date().toLocaleString()}
${result.compile ? "• Compiled before run" : "• Interpreted / no separate compile stage"}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
💡 Setup local Piston API:
   docker run -p 2000:2000 ghcr.io/engineer-man/piston
   Then use endpoint: http://localhost:2000/api/v2/execute`;
    
    outputArea.dataset.infoContent = infoContent;
    lastExecutionResult = result;
    
    if(currentOutputTab === "info") {
      outputArea.innerText = infoContent;
    }
  }
  
  // Tab switching
  function setupTabs() {
    const tabs = document.querySelectorAll('.output-tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        currentOutputTab = target;
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        if(target === 'output') {
          if(lastExecutionResult) {
            renderExecutionResult(lastExecutionResult);
          } else {
            outputArea.innerText = "✨ Press ▶ RUN to see program output.";
          }
        } else {
          const infoCached = outputArea.dataset.infoContent;
          if(infoCached) {
            outputArea.innerText = infoCached;
          } else {
            outputArea.innerText = "ℹ️ No execution yet. Run code to see detailed runtime information.";
          }
        }
      });
    });
  }
  
  function initEventListeners() {
    runButton.addEventListener('click', executeCode);
    saveCodeBtn.addEventListener('click', saveToLocalStorage);
    testApiBtn.addEventListener('click', testApiConnection);
    languageSelect.addEventListener('change', () => {
      onLanguageChange(true);
      saveToLocalStorage();
    });
    codeEditor.addEventListener('input', (e) => {
      currentCode = e.target.value;
    });
  }
  
  function finalInit() {
    loadFromLocalStorage();
    onLanguageChange(false);
    initEventListeners();
    setupTabs();
    testApiConnection(); // Test API on startup
    outputArea.dataset.infoContent = "⚙️ Ready. Configure your Piston API endpoint or use simulation mode.";
  }
  
  finalInit();
</script>
</body>
</html>
